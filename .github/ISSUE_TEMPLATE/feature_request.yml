name: Feature request
description: Propose a PM_Web change.
title: "feat(web): "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or business problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want.
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impact area
      options:
        - Marketing copy
        - Waitlist/contact flow
        - Design/UI
        - Performance/SEO
        - GitHub/release workflow
        - Other
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - ...
        - ...
    validations:
      required: true
