name: Bug report
description: Report a reproducible problem in PM_Web.
title: "bug(web): "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production
        - Preview
        - Local development
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: https://pinaymate.com/...
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add screenshots, recordings, logs, or browser/device details.
